# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography
          pip install flake8 
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # - name: Run Server
      #   run: |
      #     python scripts/server.py

      - name: Take Private key
        run: |
          mkdir -p keys
          printf '%s' "${{secrets.ota_private_key}}" > keys/private_key.pem

      - name: Build Signature
        run: |
          python scripts/Dev/sign_firmware.py

      # - name: Verify Signature
      #   run: |
      #     python scripts/verify_signature.py

      - name: Build Docker Image
        run: |
          docker build -t project1-secureotaserver:v0.15.10 .

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag project1-secureotaserver:v0.15.10${{ secrets.DOCKERHUB_USERNAME }}/project1-secureotaserver:v0.15.10
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/project1-secureotaserver:v0.15.10
